server.port=8081
grpc.server.port=-1

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# HikariCP connection pool
spring.datasource.hikari.pool-name=OrderServicePool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
#Kafka producer config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
#kafka consumer config
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.project.*


grpc.client.tracking-service.address=static://${TRACKING_SERVICE_HOST:localhost}:9090
grpc.client.tracking-service.negotiation-type=plaintext

# Demo endpoint — coordinates generated randomly within ±range of base location.
# range=0.045 ≈ 5 km. Matches the seed area used by DataBootstrapService and RiderSimulation.py.
demo.base-lat=12.9716
demo.base-lng=77.5946
demo.range=0.045

# API key authentication
api.key=${API_KEY}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Circuit Breaker: tracking-service gRPC
resilience4j.circuitbreaker.instances.canPlaceOrder.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.canPlaceOrder.sliding-window-size=10
resilience4j.circuitbreaker.instances.canPlaceOrder.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.canPlaceOrder.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.canPlaceOrder.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.canPlaceOrder.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.canPlaceOrder.register-health-indicator=true

resilience4j.circuitbreaker.instances.fetchLiveLocation.sliding-window-size=10
resilience4j.circuitbreaker.instances.fetchLiveLocation.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.fetchLiveLocation.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.fetchLiveLocation.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.fetchLiveLocation.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.fetchLiveLocation.register-health-indicator=true

resilience4j.circuitbreaker.instances.cancelOrder.sliding-window-size=10
resilience4j.circuitbreaker.instances.cancelOrder.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cancelOrder.failure-rate-threshold=70
resilience4j.circuitbreaker.instances.cancelOrder.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.cancelOrder.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cancelOrder.register-health-indicator=true