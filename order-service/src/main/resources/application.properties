server.port=8081
grpc.server.port=-1

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# HikariCP connection pool
spring.datasource.hikari.pool-name=OrderServicePool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
#Kafka producer config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
#kafka consumer config
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.project.*


grpc.client.tracking-service.address=static://localhost:9090
grpc.client.tracking-service.negotiation-type=plaintext

# Demo endpoint — coordinates generated randomly within ±range of base location.
# range=0.045 ≈ 5 km. Matches the seed area used by DataBootstrapService and RiderSimulation.py.
demo.base-lat=12.9716
demo.base-lng=77.5946
demo.range=0.045